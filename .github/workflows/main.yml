name: PythonOCC conda build
on: [push]

jobs:
  miniconda:
    name: Miniconda ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: ["ubuntu-latest"]
            #"ubuntu-latest", "windows-latest", "macos-latest"]
    steps:
      - uses: actions/checkout@v3
      - uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: pyoccenv
          python-version: 3.9
          auto-activate-base: false
      - shell: bash -l {0}
        run: |
          conda info
          conda list
      - name: install pythonocc
        shell: bash -l {0}
        run: |
          conda install -c conda-forge pythonocc-core=7.7.2
      - name: echo paths
        shell: bash -l {0}
        run: |
          conda list
          conda search pythonocc-core --info
      - uses: actions/upload-artifact@v3
        with:
          name: OCC-linux
          path: /usr/share/miniconda/envs/pyoccenv/lib/python3.9/site-packages/OCC/
